# =============================================================================
# MetricTide — local development stack
# -----------------------------------------------------------------------------
# Usage:
#   cp .env.example .env
#   docker compose up --build
# =============================================================================

name: ${COMPOSE_PROJECT_NAME:-metrictide}

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metrictide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metrictide}
      POSTGRES_DB: ${POSTGRES_DB:-metrictide}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Enables the pgvector extension on first boot
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metrictide} -d ${POSTGRES_DB:-metrictide}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metrictide

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metrictide

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override hosts so the API talks to compose services, not localhost
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - metrictide

  # ---------------------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      API_INTERNAL_BASE_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - metrictide

  # ---------------------------------------------------------------------------
  # Kafka — DEFERRED. Intentionally commented out until the streaming pipeline
  # is needed. See docs/adr/0001-defer-kafka.md before enabling.
  # ---------------------------------------------------------------------------
  # kafka:
  #   image: bitnami/kafka:3.7
  #   restart: unless-stopped
  #   environment:
  #     KAFKA_CFG_NODE_ID: 0
  #     KAFKA_CFG_PROCESS_ROLES: controller,broker
  #     KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
  #     KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
  #     KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
  #   ports:
  #     - "9092:9092"
  #   networks:
  #     - metrictide

volumes:
  pgdata:
  redisdata:

networks:
  metrictide:
    driver: bridge
